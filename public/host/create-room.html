<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Field — Create Room</title>
  <link rel="stylesheet" href="/shared/style.css"/>
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .wrap {
      flex:1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:24px;
    }
    .room-card { width:100%; max-width:560px; }
    .room-card .btn-primary {
      width:100%; margin-top:8px; padding:12px; font-size:1rem;
    }
    .back-link {
      margin-top:16px; text-align:center; font-weight:700;
    }
    .back-link a { color:var(--black); text-decoration:none; }
    .back-link a:hover { text-decoration:underline; }

    .settings-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:4px; }
    .settings-row .input-group label { font-size:0.82rem; }
    .settings-hint { font-size:0.75rem; font-weight:600; color:rgb(255, 255, 255); margin-top:3px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/host/dashboard.html" class="logo">
      <img src="/shared/brain.svg" class="logo-img" alt="Mind Field"/>
      <span class="logo-text">MiND FiELD</span>
    </a>
  </nav>

  <div class="wrap">
    <h1 class="page-title">Create New Room</h1>

    <div class="card room-card">
      <div id="msg" class="msg"></div>

      
        <div class="input-group">
          <label for="roomName">Room Name</label>
          <input type="text" id="roomName" maxlength="40"/>
        </div>


      <div class="settings-row">
        <div class="input-group">
          <label for="numQuestions">Questions</label>
          <input type="number" id="numQuestions" value="10" min="5" max="30"/>
          <div class="settings-hint">Qual round length</div>
        </div>
        <div class="input-group">
          <label for="threshold">Threshold</label>
          <input type="number" id="threshold" value="7" min="1" max="30"/>
          <div class="settings-hint">Min correct to qualify</div>
        </div>
        <div class="input-group">
          <label for="transitionSecs">Break (secs)</label>
          <input type="number" id="transitionSecs" value="90" min="10" max="300"/>
          <div class="settings-hint">Time before Mind Field</div>
        </div>
      </div>

      <button class="btn btn-primary w-full" id="createBtn" onclick="createRoom()">
        Create Room
      </button>
    </div>

    <div class="back-link">
      <a href="/host/dashboard.html">Go Back</a>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('mf_token');
    if (!token) window.location.href = '/host/signin.html';

    // ── Create room ───────────────────────────
    async function createRoom() {
      const roomName       = document.getElementById('roomName').value.trim();
      const catId          = 'all';
      const catName        = 'All Categories';
      const numQuestions   = parseInt(document.getElementById('numQuestions').value, 10) || 10;
      const threshold      = parseInt(document.getElementById('threshold').value, 10) || 7;
      const transitionSecs = parseInt(document.getElementById('transitionSecs').value, 10) || 90;
      const msg            = document.getElementById('msg');
      const btn            = document.getElementById('createBtn');

      msg.className   = 'msg';
      msg.textContent = '';

      if (!roomName) {
        msg.className = 'msg error';
        msg.textContent = 'Please enter a room name.';
        return;
      }

      // Get venue location from saved promotions
      let location = 'Unknown Venue';
      try {
        const promoRes = await fetch('/api/promotions', { headers: { Authorization: `Bearer ${token}` } });
        const promoData = await promoRes.json();
        if (promoData.venueLocation) location = promoData.venueLocation;
      } catch {}

      btn.disabled    = true;
      btn.textContent = 'Creating room...';

      try {
        const res  = await fetch('/api/rooms', {
          method:  'POST',
          headers: { 'Content-Type':'application/json', Authorization:`Bearer ${token}` },
          body:    JSON.stringify({ roomName, location, categoryId: catId, categoryName: catName, numQuestions, threshold, transitionSecs })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create room');

        localStorage.setItem('mf_room', JSON.stringify(data));
        window.location.href = '/host/game-room.html';
      } catch (e) {
        msg.className   = 'msg error';
        msg.textContent = e.message;
        btn.disabled    = false;
        btn.textContent = 'Create Room';
      }
    }

    function esc(s) {
      return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
