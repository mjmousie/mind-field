<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Field — Host Registration</title>
  <link rel="stylesheet" href="/shared/style.css"/>
  <style>
    body { display:flex; flex-direction:column; min-height:100vh; }
    .reg-wrap { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
    .reg-card { width:100%; max-width:560px; }
    .reg-card .btn-primary { width:100%; margin-top:8px; padding:12px; font-size:1rem; }
    .back-link { margin-top:16px; text-align:center; font-weight:700; font-size:0.95rem; }
    .back-link a { color:var(--black); text-decoration:none; }
    .back-link a:hover { text-decoration:underline; }
    .divider { display:flex; align-items:center; gap:10px; margin:16px 0; }
    .divider span { font-size:0.8rem; font-weight:700; color:rgba(0,0,0,0.4); }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(0,0,0,0.15); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/host/signin.html" class="logo">
      <img src="/shared/brain.svg" class="logo-img" alt="Mind Field"/>
      <span class="logo-text">MiND FiELD</span>
    </a>
  </nav>

  <div class="reg-wrap">
    <h1 class="page-title">Host Registration</h1>

    <div class="card reg-card">
      <div id="msg" class="msg"></div>
      <div class="form-row">
        <div class="input-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" autocomplete="name"/>
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email"/>
        </div>
      </div>
      <div class="form-row">
        <div class="input-group">
          <label for="displayName">Display Name</label>
          <input type="text" id="displayName"/>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="new-password"/>
        </div>
      </div>

      <button class="btn btn-primary w-full" id="registerBtn" onclick="register()">
        Create Host Account
      </button>
      <div class="divider"><span>or register with Google</span></div>
      <div id="googleBtnContainer" style="display:flex;justify-content:center;margin-bottom:4px;"></div>
    </div>

    <div class="back-link">
      <a href="/host/signin.html">Go Back</a>
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const GOOGLE_CLIENT_ID = '855545584453-litp7t3l02m0nlathu7dv72ms5it17l5.apps.googleusercontent.com';

    function initGoogleButton() {
      if (!window.google) return;
      google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential });
      google.accounts.id.renderButton(
        document.getElementById('googleBtnContainer'),
        { theme: 'outline', size: 'large', width: 480, text: 'signup_with' }
      );
    }
    if (window.google) initGoogleButton();
    else window.addEventListener('load', initGoogleButton);

    async function handleGoogleCredential(response) {
      const msg = document.getElementById('msg');
      try {
        const res  = await fetch('/api/host/google', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        localStorage.setItem('mf_token', data.token);
        localStorage.setItem('mf_host',  JSON.stringify(data.host));
        window.location.href = '/host/dashboard.html';
      } catch (e) {
        msg.className = 'msg error'; msg.textContent = e.message;
      }
    }

    async function register() {
      const fullName    = document.getElementById('fullName').value.trim();
      const email       = document.getElementById('email').value.trim();
      const displayName = document.getElementById('displayName').value.trim();
      const password    = document.getElementById('password').value;
      const msg         = document.getElementById('msg');
      const btn         = document.getElementById('registerBtn');

      msg.className = 'msg'; msg.textContent = '';
      if (!fullName || !email || !displayName || !password) { msg.className = 'msg error'; msg.textContent = 'All fields are required.'; return; }
      if (password.length < 6) { msg.className = 'msg error'; msg.textContent = 'Password must be at least 6 characters.'; return; }

      btn.disabled = true; btn.textContent = 'Creating account...';
      try {
        const res  = await fetch('/api/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, displayName, email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Registration failed');
        msg.className = 'msg success'; msg.textContent = 'Account created! Redirecting...';
        setTimeout(() => window.location.href = '/host/signin.html', 1500);
      } catch (e) {
        msg.className = 'msg error'; msg.textContent = e.message;
        btn.disabled = false; btn.textContent = 'Create Host Account';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
  </script>
</body>
</html>
