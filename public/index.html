<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Field — Last Man Standing Trivia</title>
  <link rel="stylesheet" href="/shared/style.css"/>
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--sky);
    }

    .landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 24px;
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 16px;
      animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .landing-logo { width: 72px; height: 72px; }
    .landing-title {
      font-family: var(--font-display);
      font-size: 3.2rem;
      color: var(--white);
      letter-spacing: 1px;
      line-height: 1;
    }

    .tagline {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--white);
      animation: fadeSlideIn 0.5s ease 0.15s both;
    }

    .description {
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 700;
      color: var(--white);
      max-width: 320px;
      line-height: 1.6;
      animation: fadeSlideIn 0.5s ease 0.2s both;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
      animation: fadeSlideIn 0.5s ease 0.25s both;
    }

    .btn-landing-player {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 100%; padding: 16px;
      background: var(--salmon); color: var(--black);
      border: var(--border); border-radius: var(--radius-pill);
      font-family: var(--font-display); font-size: 1.3rem;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-landing-solo {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 100%; padding: 16px;
      background: var(--salmon-dark); color: var(--black);
      border: var(--border); border-radius: var(--radius-pill);
      font-family: var(--font-display); font-size: 1.3rem;
      text-decoration: none;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-landing-player:active { transform: translateY(2px); box-shadow: 1px 1px 0 #111; }

    .btn-landing-host {
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      width: 100%; padding: 14px;
      background: transparent; color: var(--white);
      border: none;
      font-family: var(--font-display); font-size: 0.8rem;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-landing-host:hover { background: rgba(0,0,0,0.08); }

    .footer-note {
      font-size: 0.8rem; font-weight: 700;
      color: rgba(0,0,0,0.4);
      animation: fadeSlideIn 0.5s ease 0.35s both;
    }

    @keyframes popIn {
      from { opacity:0; transform:scale(0.8); }
      to   { opacity:1; transform:scale(1); }
    }
    @keyframes fadeSlideIn {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="landing">
    <div class="logo-wrap">
      <img src="/shared/brain.svg" class="landing-logo" alt="Mind Field"/>
      <div class="landing-title">MiND FiELD</div>
    </div>

    <div class="tagline">Last Man Standing Trivia</div>
    <div class="description">Answer fast. Outlast everyone. One question wrong in the Mind Field and you're out. Do you have what it takes to be the last one standing?</div>

    <div class="btn-group">
      <a href="/player" class="btn-landing-player">
        Join a Game
      </a>
      <a href="/player/solo.html" class="btn-landing-solo">
        Play Solo
      </a>
      <a href="/host" class="btn-landing-host">
        Host Sign In
      </a>
    </div>
  </div>
</body>
</html>
